{% extends 'base.html' %}
{% block title %}Eliminar {{ object.nombre }}{% endblock %}
{% block content %}
<div class="md3-page-header">
    <div class="md3-flex md3-flex-align-center" style="gap:12px;">
        <a href="{% url 'productos:list' %}" class="md3-btn md3-btn-icon md3-btn-outlined">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div>
            <h1 class="md3-page-title">Eliminar Producto</h1>
            <p class="md3-page-subtitle">{{ object.nombre }}</p>
        </div>
    </div>
</div>

<div class="px-3 px-md-4">
    <div class="md3-card-outlined" style="max-width:480px;">
        <div style="padding:24px; text-align:center;">
            <span class="material-symbols-outlined" style="font-size:48px; color:var(--md-sys-color-error); margin-bottom:16px;">warning</span>
            <h3 style="margin:0 0 8px;">Confirmar Eliminaci&oacute;n</h3>
            <p style="color:var(--md-sys-color-on-surface-variant); margin:0 0 24px;">
                &iquest;Est&aacute;s seguro de eliminar <strong>{{ object.nombre }}</strong>?
            </p>
            <form method="post">
                {% csrf_token %}
                <div style="display:flex; gap:8px; justify-content:center;">
                    <a href="{% url 'productos:list' %}" class="md3-btn md3-btn-outlined">Cancelar</a>
                    <button type="submit" class="md3-btn md3-btn-filled" style="background:var(--md-sys-color-error);">
                        <span class="material-symbols-outlined" style="font-size:18px;">delete</span>
                        Eliminar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
