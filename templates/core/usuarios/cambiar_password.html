{% extends 'base.html' %}

{% block title %}Cambiar Contraseña - {{ RESTAURANT_NAME }}{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 0 auto;">
    <div class="md3-flex" style="gap: 0.75rem; align-items: center; margin-bottom: 1.5rem;">
        <a href="{% url 'core:usuario_detalle' user.pk %}" class="md3-btn md3-btn-outlined md3-btn-sm">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div>
            <h1 class="md3-page-title">Cambiar Contraseña</h1>
            <p class="md3-page-subtitle">{{ user.get_full_name|default:user.username }}</p>
        </div>
    </div>

    <div class="md3-card-elevated" style="border-radius: 16px;">
        <div class="md3-card-body" style="padding: 1.5rem;">
            <form method="post" novalidate>
                {% csrf_token %}

                <div style="margin-bottom: 1rem;">
                    <label class="md3-label">Contraseña Actual</label>
                    <div class="md3-flex" style="gap: 0.5rem; align-items: center;">
                        <input type="password" name="password_actual" id="passwordActual" class="md3-input" placeholder="Ingresa tu contraseña actual" required style="flex: 1;">
                        <button type="button" class="md3-btn md3-btn-outlined md3-btn-sm toggle-btn" tabindex="-1" style="min-width: 40px;">
                            <span class="material-symbols-outlined toggle-icon" style="font-size: 1rem;">visibility</span>
                        </button>
                    </div>
                </div>

                <div style="margin-bottom: 1rem;">
                    <label class="md3-label">Nueva Contraseña</label>
                    <div class="md3-flex" style="gap: 0.5rem; align-items: center;">
                        <input type="password" name="password_nueva" id="passwordNueva" class="md3-input" placeholder="Nueva contraseña" required style="flex: 1;">
                        <button type="button" class="md3-btn md3-btn-outlined md3-btn-sm toggle-btn" tabindex="-1" style="min-width: 40px;">
                            <span class="material-symbols-outlined toggle-icon" style="font-size: 1rem;">visibility</span>
                        </button>
                    </div>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label class="md3-label">Confirmar Nueva Contraseña</label>
                    <div class="md3-flex" style="gap: 0.5rem; align-items: center;">
                        <input type="password" name="password_confirmar" id="passwordConfirmar" class="md3-input" placeholder="Repite la nueva contraseña" required style="flex: 1;">
                        <button type="button" class="md3-btn md3-btn-outlined md3-btn-sm toggle-btn" tabindex="-1" style="min-width: 40px;">
                            <span class="material-symbols-outlined toggle-icon" style="font-size: 1rem;">visibility</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="md3-btn md3-btn-filled" style="width: 100%;">
                    <span class="material-symbols-outlined" style="margin-right: 0.25rem; font-size: 0.9rem;">check</span>Cambiar Contraseña
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.querySelectorAll('.toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var input = this.parentElement.querySelector('input');
        var icon = this.querySelector('.toggle-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    });
});
</script>
{% endblock %}
